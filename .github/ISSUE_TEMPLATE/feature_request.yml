name: Feature request
description: Suggest an improvement or new capability for Anchr
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the drift, gap, or friction you are hitting.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Anchr to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: input
    id: agent
    attributes:
      label: AI agent this relates to (if any)
      placeholder: e.g. Claude Code, Cursor, Copilot, Cline
